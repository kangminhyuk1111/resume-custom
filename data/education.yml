section_title: 교육 및 성장 활동
items:
  - id: grit-moments
    date: 2025.12 - 진행중
    ongoing: true
    title: 그릿 모먼츠 2기
    body: |
      <p>과제 기반 소프트웨어 밀착 멘토링 교육입니다. 약 2달간 6권의 책을 읽고 토론하며, 개발자로서 삶을 대하는 태도와 앞으로 가져야 할 마음가짐에 대해 깊이 고민했습니다. 동시에 <strong>프롬프트 엔지니어링, AI Agent Workflow 설계, 바이브 코딩</strong> 등 AI를 개발 생산성의 도구로 효과적으로 활용하는 방법론을 집중적으로 탐구했습니다.</p>

  - id: chorok-study
    date: 2025.05 - 2025.07
    ongoing: false
    title: 초록 스터디 1기
    body: |
      <p>8주간 과제 기반 학습 테스트를 통해 코드를 작성하고, 멘토·멘티·리뷰어가 코드리뷰 피드백을 공유했습니다. 멘티들에게 약 30회 이상의 코드리뷰를 수행했고, 남의 코드를 읽으면서 "왜 이렇게 짰을까"를 고민하는 습관이 생겼습니다.</p>

  - id: company-study-leader
    date: 2024.11 - 2025.02
    ongoing: false
    title: 사내 스터디 리더 운영
    body: |
      <p>개발 기술의 변화 속도를 따라가려면 팀 차원의 학습이 필요하다고 느껴, Java 스터디를 기획하고 3개월간 진행했습니다. 주 1회 블로깅을 공유·발표하는 루틴을 정착시켰고, 이 스터디에서 학습한 SQL Injection 공격 원리를 다음 날 레거시 코드에 적용해본 것이 실제 취약점 발견으로 이어졌습니다.</p>

  - id: tech-blog
    date: 2022 - 진행중
    ongoing: true
    title: 기술 블로그 운영
    body: |
      <p>만 4년간 공부한 내용과 개발 과정에서 겪은 시행착오를 꾸준히 기록하고 있습니다. 누군가 같은 문제를 겪었을 때 도움이 되길 바라는 마음으로 쓰고 있고, <strong>누적 포스팅 120+, 누적 방문자 수 18,000+</strong>을 기록했습니다.</p>
