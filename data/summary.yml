headline: 결국 서비스는 사용자에게 닿아야 합니다.
body: |
  <strong>AI가 만드는 것보다, AI가 만든 결과물을 프로덕션 품질로 운영하는 것이 훨씬 어렵습니다.</strong> 200명이 넘는 구독자에게 매일 아침 아티클을 보내는 서비스 dev-letter를 직접 만들고 운영하면서 이 사실을 매일 체감하고 있습니다. SMTP 한도를 지키는 것도, 중복 발송을 막는 것도, 결국 구독자가 내일도 이 서비스를 쓰고 싶게 만드는 일입니다.<br><br>
  <strong>AI로 자동화할수록 새로운 엔지니어링 과제가 열리고, 그 과제를 해결하면 또 다음 자동화가 가능해지는 순환</strong>을 직접 경험했습니다. 여러 에이전트가 동시에 작업할 때 생기는 충돌, 자동화된 발송의 중복 방지, SMTP 자원 보호. 이런 문제들은 AI를 실제 서비스에 넣어본 사람만 마주칩니다. 이 순환을 만들어낼 수 있는 팀에서 일하고 싶습니다.
