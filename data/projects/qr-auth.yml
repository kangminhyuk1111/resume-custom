id: qr-auth
title: 원내 출입 QR 인증 시스템 · 현장 출동 없는 운영 환경 구축
type: work
type_label: 실무 경험
links: []

blocks:
  - type: metrics
    items:
      - kind: problem
        label: Before
        value: 일 5~10회
        sub: 현장 출동
      - kind: improve
        label: After
        value: 주 1~2회
        sub: 사실상 무출동

  - type: step
    label: 문제
    body: |
      <p><strong>현장 인력이 하루 5~10회 직접 출동해 PC를 재부팅해야 하는 상황이었습니다.</strong></p>
      <p>병원 스피드게이트(QR 인식 차단문)의 QR 인식을 담당하는 소프트웨어는 <strong>병원 인트라넷 웹앱의 "QR 인증기" 기능</strong>이었는데, 간헐적으로 WiFi가 끊기면 <strong>인트라넷 전체가 로그아웃</strong>되면서 QR 인증기 화면까지 함께 사라졌습니다. 화면이 꺼진 상태에서는 QR을 아무리 갖다 대도 인증이 되지 않았습니다.</p>

  - type: step
    label: 해결
    title: 복합 소프트웨어 의존을 끊고 단일 목적 앱으로 분리
    body: |
      <p>먼저 병원 측에 WiFi 안정화를 요청했지만 "원인 파악이 어렵다"는 답변이 돌아왔습니다. 기존 인트라넷은 복합 소프트웨어라 QR 인증만을 위한 복구 로직을 넣기도 어려웠습니다.</p>
      <p>2~3명의 소규모 팀에서 제가 직접 병원 서버팀과 소통하여 <strong>QR 인증 API를 별도로 요청</strong>받고, <strong>QR 인증만 수행하는 경량 앱</strong>을 직접 개발하여 스피드게이트 미니 PC에 설치했습니다.</p>
      <p>WiFi가 끊겨도 <strong>재연결될 때까지 자동 재시도</strong>하도록 설계했고, 실제로 WiFi가 1분 이내로 복구되는 패턴이었기 때문에 이 방식으로 충분했습니다.</p>

  - type: step
    label: 검증
    body: |
      <p>로컬에서 강제 WiFi 차단 테스트 후 점진적으로 배포했습니다. 전체 적용 이후 주 단위 모니터링 결과를 팀에 공유하며, 하루 5~10회이던 현장 출동이 <strong>주 1~2회 수준</strong>으로 감소했음을 데이터로 확인시켰습니다.</p>
      <p>완전히 0회가 되지 못하는 이유는, WiFi가 장시간 완전 단절되는 드문 경우에는 물리적 재부팅이 불가피한 현실적 한계가 있기 때문입니다.</p>

  - type: reflection
    body: |
      <strong>통제할 수 없는 환경을 탓하기보다, 통제할 수 있는 범위에서 최선을 찾습니다.</strong> 병원 WiFi는 우리가 고칠 수 없었습니다. "근본 원인을 못 고치면, 근본 원인에 의존하지 않는 구조를 만들면 되지 않나?"로 발상을 바꾸니 길이 보였습니다. 완벽한 해결은 아니었지만, 출동 횟수가 눈에 띄게 줄었을 때 방향이 맞았다는 걸 확인할 수 있었습니다.
