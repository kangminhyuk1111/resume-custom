id: sql-injection
title: 레거시 코드 SQL Injection 취약점 파악 및 개선
type: work
type_label: 실무 경험
links: []

blocks:
  - type: step
    label: 문제
    body: |
      <p><strong>SQLMap으로 테스트해보니 실제로 Injection이 성공하는 상태였습니다.</strong></p>
      <p>보안 관련 이슈를 접하고 궁금해서 SQL Injection을 학습한 직후, "우리 코드는 괜찮을까?"라는 생각에 레거시 코드를 분석했습니다.</p>
      <p>사용자 입력값을 문자열 그대로 이어붙여 SQL 쿼리를 만드는 <strong>String Concatenation 방식이 여러 모듈에 걸쳐 수십 건</strong> 존재했고, <code>' OR '1'='1</code> 같은 조건으로 인증 우회나 데이터 유출이 가능한 심각한 취약점이었습니다.</p>

  - type: step
    label: 해결
    body: |
      <p>2~3명의 팀 내에서 보안 점검과 개선을 자발적으로 주도했습니다. 점진적 전환과 전면 전환 중 고민했지만, 보안 취약점은 하나라도 남아있으면 의미가 없다고 판단하여 <strong>전면 개선</strong>을 택했습니다.</p>
      <p>전체 코드베이스를 점검하여 <code>PreparedStatement</code> 기반으로 일괄 전환하고, 누락 방지를 위해 <strong>모듈별 체크리스트</strong>를 만들어 하나씩 소거했습니다.</p>

  - type: step
    label: 검증
    body: |
      <p>SQLMap으로 개선 전/후 비교 테스트를 수행했습니다. 개선 전 Injection 취약점이 감지되었으나, <strong>개선 후 취약점 미탐지 및 Injection 시도 전면 차단</strong>을 확인했습니다.</p>

  - type: reflection
    body: |
      <strong>보안 취약점은 하나라도 남아있으면 의미가 없다는 것을 배웠습니다.</strong>

      <p>점진적 전환과 전면 전환 중 고민했지만, 보안은 "거의 다 됐다"가 통하지 않는 영역이었습니다. 모듈별 체크리스트를 만들어 하나씩 소거하는 방식으로 누락을 방지한 경험이, 이후 다른 프로젝트에서도 전수 점검이 필요한 상황에서의 판단 기준이 되었습니다.</p>

      <p>"배운 걸 써먹을 수 있을까?"가 아니라 "우리 코드는 괜찮을까?"로 연결되는 감각이 이때 생겼습니다.</p>
