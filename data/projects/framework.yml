id: framework
title: 사내 프레임워크 코드 개선 · 중복 로직 30%+ 제거
type: work
type_label: 실무 경험
links: []

blocks:
  - type: step
    label: 문제
    body: |
      <p><strong>서비스마다 같은 변환 코드를 매번 복사·붙여넣기하고 있었습니다.</strong> 병원 시스템과 데이터를 주고받으려면 정해진 포맷(전문)으로 변환해야 하는데, 필드 하나 바뀌면 <strong>여러 파일을 동시에 수정</strong>해야 하는 구조였습니다. 전문 처리 자체를 제거할 수 없는 외부 의존성 제약이 존재했습니다.</p>

  - type: step
    label: 해결
    body: |
      <p>2~3명의 팀에서 프레임워크 설계와 구현을 주도했습니다. 전문 구조를 없앨 수는 없으니, 반복되는 변환 로직을 한 곳에서 관리하는 방향으로 잡았습니다.</p>
      <p>프레임워크 내부에 <code>MciUtils</code> 클래스를 설계하여 input/output 매핑 로직을 공통 모듈로 추출하고, 각 서비스에서는 설정값만 넘기면 되도록 구조를 변경했습니다.</p>

  - type: step
    label: 검증
    body: |
      <p>프레임워크 업데이트 후 각 서비스 적용을 확인했습니다. <strong>소스코드 라인 수 20~40% 절감</strong>, 동료들로부터 "코드 작성이 훨씬 수월해졌다"는 피드백을 받았습니다.</p>

  - type: reflection
    body: |
      <strong>"제거할 수 없다면 다루기 쉽게 만들자."</strong>

      <p>전문 처리를 없애는 게 가장 깔끔하지만, 외부 API 의존성 때문에 불가능했습니다. 대신 팀원들이 변환 코드를 신경 쓰지 않아도 되는 구조를 만든 결과, 신규 서비스 추가 시 변환 로직 작성 시간이 체감상 절반 이하로 줄었습니다.</p>

      <p>AI가 실무에 가까워지고 있는 지금, 코드는 사람뿐 아니라 <strong>AI가 읽고 이해하기 좋은 구조</strong>여야 한다고 생각합니다.</p>
