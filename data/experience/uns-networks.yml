id: uns-networks
section_title: 경력
company: (주)유엔에스네트웍스 · 모바일 운영팀
role: Backend Developer · 원내 출입 시스템 및 데이터 통신 프레임워크 개발, 운영
period: 2023.07 - 2025.12
highlights:
  - <strong>일 5~10회 현장 출동을 1회로 줄이는 자체 QR 인증 솔루션을 개발했습니다.</strong> 원내 QR 출입 장애로 현장 인력이 매번 PC를 재부팅하러 뛰어가는 상황이 반복됐습니다. 근본 원인을 분석하고 병원 서버팀과 직접 소통하여 인증 API를 별도로 요청받아 경량 앱을 설계·배포했습니다.
  - <strong>서비스마다 복사·붙여넣기되던 변환 코드를 공통 모듈로 추출하여 코드량 20~40% 절감했습니다.</strong> 필드 하나가 바뀌면 여러 파일을 동시에 수정해야 하는 구조가 문제였습니다. 프레임워크 내부에 공통 모듈을 설계하여 각 서비스에서는 설정값만 넘기면 되도록 구조를 변경했습니다.
  - <strong>레거시 전체에서 수십 건의 SQL Injection 취약점을 자발적으로 발견하고 전면 제거했습니다.</strong> 보안 관련 이슈를 접하고 궁금해서 학습한 뒤, 그날 바로 "우리 코드는 괜찮을까?" 하는 생각에 실무 코드를 점검했습니다. SQLMap 테스트에서 실제로 Injection이 성공하는 상태였고, PreparedStatement로 전면 전환하여 차단을 확인했습니다.
  - <strong>팀에 학습 문화가 전무한 상황에서 Java 스터디를 직접 기획하고 3개월간 운영했습니다(주 2회).</strong> 개발 기술은 빠르게 변하는데 팀 내에서 기술을 공유하는 루틴이 없었습니다. 주 1회 블로깅 공유를 정착시키며 팀 안에서 기술을 이야기하는 분위기를 만들어갔습니다.
